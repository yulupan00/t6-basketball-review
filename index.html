<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Report Review - Human Study</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="landing-container">
        <div class="landing-card">
            <div class="landing-header">
                <h1>Sports Report Review</h1>
                <p class="subtitle">Human Evaluation Study (T6)</p>
            </div>
            <div class="landing-body">
                <p class="description">
                    Welcome! Please select which study you'd like to do.
                </p>
                <div class="study-buttons">
                    <a href="sports.html?study=saliency" class="btn btn-study btn-saliency">
                        <span class="study-name">Saliency</span>
                        <span class="study-desc">Tick the coverage facts mentioned in each report</span>
                    </a>
                    <a href="sports.html?study=style" class="btn btn-study btn-style">
                        <span class="study-name">Writing Style</span>
                        <span class="study-desc">Rate each report's overall writing style (1–5)</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
