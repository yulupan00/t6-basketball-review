<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Report Review - Choose Sport</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="landing-container">
        <div class="landing-card">
            <div class="landing-header">
                <h1 id="hdr">Sports Report Review</h1>
                <p class="subtitle" id="sub">Choose a sport</p>
            </div>
            <div class="landing-body">
                <p class="description" id="desc">Pick a sport to begin.</p>
                <div class="sport-buttons" id="sportButtons">
                    <a id="lnkBasketball" class="btn btn-sport btn-basketball" href="#">Basketball</a>
                    <a id="lnkHockey"     class="btn btn-sport btn-hockey"     href="#">Hockey</a>
                    <a id="lnkSoccer"     class="btn btn-sport btn-soccer"     href="#">Soccer</a>
                </div>
                <p class="mt-3 text-center"><a href="index.html" class="text-muted small">← Back to study selection</a></p>
            </div>
        </div>
    </div>
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const study = params.get("study") || "saliency";
            if (!["saliency", "style"].includes(study)) { window.location.href = "index.html"; return; }
            const STUDY_LABEL = {saliency: "Saliency", style: "Writing Style"}[study];
            document.getElementById("hdr").textContent = `${STUDY_LABEL} Study — Choose Sport`;
            document.getElementById("sub").textContent = `T6 · ${STUDY_LABEL}`;
            document.getElementById("desc").textContent =
                study === "saliency"
                    ? "Tick the coverage facts mentioned in each report."
                    : "Rate each report's overall writing style on a 1–5 scale.";
            for (const sp of ["basketball", "hockey", "soccer"]) {
                const a = document.getElementById("lnk" + sp[0].toUpperCase() + sp.slice(1));
                a.href = `start.html?study=${study}&sport=${sp}`;
            }
        })();
    </script>
</body>
</html>
