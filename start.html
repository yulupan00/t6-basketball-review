<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Report Review - Sign in</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="landing-container">
        <div class="landing-card">
            <div class="landing-header">
                <h1 id="pageTitle">Report Review</h1>
                <p class="subtitle" id="sportSubtitle">Human Evaluation Study (T6)</p>
            </div>
            <div class="landing-body">
                <p class="description" id="descText"></p>
                <div class="instructions" id="howItWorks"></div>

                <div class="resume-banner" id="resumeBanner" style="display: none;">
                    <p>You have a previous session in progress.</p>
                    <div class="resume-actions">
                        <button class="btn btn-outline-primary btn-sm" id="resumeBtn" type="button">Resume</button>
                        <button class="btn btn-outline-secondary btn-sm" id="newSessionBtn" type="button">Start Fresh</button>
                    </div>
                </div>

                <form id="startForm" class="start-form">
                    <div class="mb-3">
                        <label for="user_id" class="form-label">Enter your User ID</label>
                        <input type="text" class="form-control" id="user_id" name="user_id"
                               placeholder="e.g., reviewer_01" required autocomplete="off">
                    </div>
                    <div class="mb-3">
                        <label for="user_email" class="form-label">Email <span class="text-muted" style="font-weight:400;">(optional)</span></label>
                        <input type="email" class="form-control" id="user_email" name="user_email"
                               placeholder="you@example.com" autocomplete="off">
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100">Start Review</button>
                </form>

                <p class="mt-3 text-center">
                    <a id="backLink" href="sports.html" class="text-muted small">← Back to sport selection</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const sport = params.get("sport") || "basketball";
            const study = params.get("study") || "saliency";
            const SPORTS = {basketball: "Basketball", hockey: "Hockey", soccer: "Soccer"};
            const STUDIES = {saliency: "Saliency", style: "Writing Style"};
            if (!SPORTS[sport] || !STUDIES[study]) { window.location.href = "index.html"; return; }

            // Keep saliency's existing keys untouched so the saliency flow is unchanged.
            // Style flow uses a study-prefixed namespace.
            const STORAGE_SESSION = study === "style"
                ? `t6_style_${sport}_session`
                : `t6_${sport}_session`;
            const STORAGE_SCORES  = study === "style"
                ? `t6_style_${sport}_scores`
                : `t6_${sport}_scores`;

            const sportLabel = SPORTS[sport];
            const studyLabel = STUDIES[study];

            document.getElementById("pageTitle").textContent = `${sportLabel} ${studyLabel} Review`;
            document.getElementById("sportSubtitle").textContent = `T6 · ${sportLabel} · ${studyLabel}`;
            document.getElementById("backLink").href = `sports.html?study=${study}`;
            document.title = `${sportLabel} ${studyLabel} Review`;

            // Description + instructions vary per study.
            const desc = document.getElementById("descText");
            const how  = document.getElementById("howItWorks");
            const totalSpan = '<strong id="totalCount">…</strong>';
            const sportSpan = sportLabel.toLowerCase();
            if (study === "saliency") {
                desc.innerHTML = `In this study, you will review ${totalSpan} ${sportSpan} game reports
                    generated by AI models. For each report, a list of coverage facts is shown on the right.
                    Tick the box next to every fact that the report mentions.`;
                how.innerHTML = `<h5>How it works</h5><ul>
                    <li>Read the generated report on the left.</li>
                    <li>For each coverage fact on the right, check the box if the report mentions it.</li>
                    <li>Your selections are saved automatically in your browser.</li>
                    <li>You can return later with the same User ID and resume.</li>
                </ul>`;
            } else { // style
                desc.innerHTML = `In this study, you will rate the writing style of ${totalSpan} ${sportSpan}
                    game reports generated by AI models. For each report, give an overall score from 1 to 5.`;
                how.innerHTML = `<h5>How it works</h5><ul>
                    <li>Read the generated report on the left.</li>
                    <li>Read the rubric on the right. It lists what counts as good writing style.</li>
                    <li>Pick an <strong>overall</strong> score from 1 to 5.</li>
                    <li>Your selections are saved automatically; you can resume any time.</li>
                </ul>`;
            }

            // Load samples count.
            const s = document.createElement("script");
            s.src = `data/samples_${sport}.js`;
            s.onload = () => {
                document.getElementById("totalCount").textContent = window.SAMPLES.length;
            };
            s.onerror = () => {
                document.getElementById("totalCount").textContent = "?";
            };
            document.body.appendChild(s);

            const userIdInput = document.getElementById("user_id");
            const userEmailInput = document.getElementById("user_email");
            const resumeBanner = document.getElementById("resumeBanner");

            try {
                const sess = JSON.parse(localStorage.getItem(STORAGE_SESSION) || "null");
                if (sess && sess.userId) {
                    userIdInput.value = sess.userId;
                    userEmailInput.value = sess.userEmail || "";
                    resumeBanner.style.display = "block";
                }
            } catch (_) { /* ignore */ }

            const reviewPage = study === "style" ? "style.html" : "review.html";

            document.getElementById("resumeBtn").addEventListener("click", () => {
                window.location.href = `${reviewPage}?study=${study}&sport=${sport}`;
            });
            document.getElementById("newSessionBtn").addEventListener("click", () => {
                localStorage.removeItem(STORAGE_SESSION);
                localStorage.removeItem(STORAGE_SCORES);
                resumeBanner.style.display = "none";
                userIdInput.value = "";
                userEmailInput.value = "";
                userIdInput.focus();
            });

            document.getElementById("startForm").addEventListener("submit", (e) => {
                e.preventDefault();
                const userId = userIdInput.value.trim();
                if (!userId) return;
                const session = {
                    userId,
                    userEmail: userEmailInput.value.trim(),
                    sport,
                    study,
                    sessionId: Date.now().toString(36) + Math.random().toString(36).slice(2, 8),
                    startedAt: new Date().toISOString(),
                };
                const prior = localStorage.getItem(STORAGE_SESSION);
                if (prior) {
                    try {
                        const p = JSON.parse(prior);
                        if (p.userId !== userId) localStorage.removeItem(STORAGE_SCORES);
                    } catch (_) { localStorage.removeItem(STORAGE_SCORES); }
                }
                localStorage.setItem(STORAGE_SESSION, JSON.stringify(session));
                window.location.href = `${reviewPage}?study=${study}&sport=${sport}`;
            });
        })();
    </script>
</body>
</html>
